# English Agent 配置

llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: ""  # 从 .env 读取 DEEPSEEK_API_KEY
  max_tokens: 4096
  temperature: 0.7

storage:
  base_dir: "./data"

script:
  target_words: 280         # 目标词数（约2分钟）
  max_words: 350           # 最大词数上限
  target_duration_sec: 120 # 目标时长（秒）

material:
  push_morning_hour: 10    # 早间推送时间
  push_evening_hour: 22    # 晚间推送时间
